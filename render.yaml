services:
  - type: web
    name: robin-whatsapp-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GREEN_API_URL
        sync: false
      - key: GREEN_API_INSTANCE
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
